[project]
name = "timebaseula"
version = "0.1.0"
description = "Port of TimeBase to pythonic and Dribia standards to be used with Nixtla's NeuralForecast"
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "MIT"
authors = [{ name = "Dribia Data Research", email = "ula@dribia.com" }]
maintainers = [{ name = "Dribia Data Research", email = "ula@dribia.com" }]
dependencies = [
	"matplotlib>=3.9.0,<4",
	"neuralforecast>=1.7.4,<2",
	"numpy>=2.2.0,<3",
	"pandas>=2.2.0,<3",
	"rich>=14.1.0,<15",
	"torch>=2.0.0,<3",
	"typer>=0.12.4,<0.22",
]

[project.urls]
Homepage = "https://github.com/dribia/timebaseula"
Repository = "https://github.com/dribia/timebaseula"

[dependency-groups]
dev = [
	"deptry==0.24.0",
	"prek>=0.2.30,<1",
]
ci = [
	"setuptools>=80.10.1,<81",
]
docs = [
	"mike>=2.1.3,<3",
	"mkdocs>=1.6.1,<2",
	"mkdocs-material>=9.6.14,<10",
]
lint = [
	"ruff==0.14.13",
	"tombi==0.7.22",
	"ty==0.0.13",
]
test = [
	"pytest>=9.0.1,<10",
	"pytest-cov>=7.0.0,<8",
	"pytest-mock>=3.14.0,<4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.tombi.format.rules]
indent-style = "tab"

[tool.deptry.per_rule_ignores]
"DEP004" = ["scripts/*.py", "scripts/**/*.py"]

[tool.ruff]
target-version = "py313"
include = [
	"timebaseula/**/*.py",
	"tests/**/*.py",
]

[tool.ruff.lint]
select = [
	"E",  # pycodestyle errors
	"W",  # pycodestyle warnings
	"F",  # pyflakes
	"I",  # isort
	"C",  # convention
	"B",  # flake8-bugbear
	"D",  # pydocstyle
	"UP",  # pyupgrade
	"N",  # pep8-naming
	"NPY",  # numpy
	"PD",  # pandas
	"RUF",  # ruff
	"PTH",  # pathlib
	"SIM",  # simplify
	"RET",  # return
	"RSE",  # raise
	"Q",  # quotes
	"G",  # logging-format
	"LOG",  # logging
	"ISC",  # implicit str concat
	"C4",  # comprehensions
	"COM",  # commas
	"TD",  # to-do
	"INT",  # gettext
	"TRY",  # tryceratops
	"TID",  # tidy imports
	"ANN",  # annotations
]
ignore = [
	"C901",  # function is too complex
	"RUF013",  # implicit optional
	"ISC001",  # allow implicit str concat
	"COM812",  # allow missing trailing comma
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D"]
"scripts/*.py" = ["B008"]
"timebaseula/cli.py" = ["B008"]

[tool.ruff.lint.isort]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "--verbose"
filterwarnings = "error"
xfail_strict = true
testpaths = ["tests"]
markers = [
	"integration: integration tests",
]

[tool.coverage.run]
source = ["timebaseula"]
branch = true

[tool.coverage.report]
precision = 2
exclude_lines = [
	"pragma: no cover",
	"raise NotImplementedError",
	"if TYPE_CHECKING:",
	"@overload",
]

[tool.coverage.xml]
output = "coverage.xml"

[tool.ty.src]
include = [
	"timebaseula",
	"tests",
]

[tool.uv]
required-version = ">=0.9.26,<1.0"
default-groups = ["ci", "dev", "lint", "test", "docs"]
