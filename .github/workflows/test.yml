name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Run unit tests
        run: |
          uv run --with pytest --with pytest-cov --with pytest-mock python -m pytest --cov --cov-report=xml --cov-report=html -m "not integration and not benchmark"
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && secrets.CODECOV_TOKEN != ''
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
